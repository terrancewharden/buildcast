<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>BuildCast — AI Construction Timelapse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080909; --s1:#0E0F11; --s2:#141518; --s3:#1C1E23; --s4:#22252C;
  --border:#2A2D35; --border-light:#343840;
  --amber:#F59E0B; --amber-bright:#FCD34D;
  --amber-dim:rgba(245,158,11,0.08); --amber-glow:rgba(245,158,11,0.22);
  --green:#10B981; --red:#EF4444;
  --text:#F2F2F2; --text-2:#9CA3AF; --text-3:#4B5563;
  --r:12px; --r-lg:20px; --r-xl:32px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes glow{0%,100%{box-shadow:0 0 24px var(--amber-glow)}50%{box-shadow:0 0 56px rgba(245,158,11,0.5),0 0 100px rgba(245,158,11,0.15)}}
@keyframes bounceIn{0%{transform:scale(0.82);opacity:0}65%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
@keyframes barFill{from{width:0%}to{width:var(--target-w)}}

.fade-up{animation:fadeUp 0.55s ease both}
.fade-up-1{animation:fadeUp 0.55s 0.1s ease both}
.fade-up-2{animation:fadeUp 0.55s 0.2s ease both}
.fade-up-3{animation:fadeUp 0.55s 0.32s ease both}
.fade-in{animation:fadeIn 0.4s ease both}
.bounce-in{animation:bounceIn 0.55s ease both}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(8,9,9,0.96);backdrop-filter:blur(24px)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;cursor:pointer;display:flex;align-items:center}
.logo-accent{color:var(--amber)}
.nav-pill{font-size:11px;font-weight:700;letter-spacing:0.5px;background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,0.28);padding:5px 12px;border-radius:20px}

/* HOME */
.home{min-height:calc(100vh - 64px);display:flex;flex-direction:column;align-items:center}
.hero{width:100%;max-width:880px;padding:88px 32px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:26px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--amber-dim);border:1px solid rgba(245,158,11,0.25);border-radius:40px;padding:8px 18px;font-size:12px;font-weight:700;color:var(--amber);letter-spacing:0.5px}
.hero-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pulse 1.8s ease-in-out infinite}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(54px,9vw,100px);line-height:0.94;letter-spacing:2px}
.hero-em{color:var(--amber)}
.hero-sub{font-size:clamp(15px,2.2vw,19px);color:var(--text-2);line-height:1.65;max-width:540px;font-weight:400}
.hero-cta{display:inline-flex;align-items:center;gap:10px;background:var(--amber);color:#000;font-size:16px;font-weight:800;letter-spacing:0.4px;padding:17px 40px;border-radius:50px;border:none;cursor:pointer;box-shadow:0 0 40px var(--amber-glow);transition:all 0.2s;margin-top:4px}
.hero-cta:hover{background:var(--amber-bright);transform:translateY(-2px);box-shadow:0 0 64px rgba(245,158,11,0.55)}
.hero-arrow{font-size:18px;transition:transform 0.2s}
.hero-cta:hover .hero-arrow{transform:translateX(5px)}

/* Hero visual */
.hero-visual{width:100%;max-width:860px;padding:0 32px 88px;display:flex;align-items:center;justify-content:center}
.hv-card{flex:1;max-width:260px;aspect-ratio:9/16;border-radius:var(--r-xl);overflow:hidden;position:relative;border:1px solid var(--border)}
.hv-before{background:linear-gradient(155deg,#1a1611 0%,#2d1f08 55%,#111010 100%)}
.hv-after{background:linear-gradient(155deg,#081520 0%,#0d3025 55%,#081416 100%);animation:glow 3s ease-in-out infinite}
.hv-grid{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(255,255,255,0.025) 29px,rgba(255,255,255,0.025) 30px),repeating-linear-gradient(90deg,transparent,transparent 29px,rgba(255,255,255,0.025) 29px,rgba(255,255,255,0.025) 30px)}
.hv-label{position:absolute;bottom:16px;left:16px;font-size:10px;font-weight:800;letter-spacing:2.5px;padding:4px 10px;border-radius:4px;background:rgba(0,0,0,0.55)}
.hv-before .hv-label{color:var(--text-3)}
.hv-after .hv-label{color:var(--amber)}
.hv-mid{display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 28px;color:var(--amber)}
.hv-ai-bubble{width:52px;height:52px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:#000;box-shadow:0 0 36px var(--amber-glow);animation:glow 2.4s ease-in-out infinite}
.hv-line{width:2px;height:44px;background:linear-gradient(transparent,var(--amber) 50%,transparent)}

/* HOW IT WORKS */
.how{width:100%;max-width:860px;padding:0 32px 100px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.how-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 22px;transition:border-color 0.2s}
.how-card:hover{border-color:var(--border-light)}
.how-num{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:1px;line-height:1;margin-bottom:12px;color:var(--s4)}
.how-card:last-child .how-num{color:rgba(245,158,11,0.18)}
.how-icon{font-size:28px;margin-bottom:12px}
.how-title{font-size:15px;font-weight:700;margin-bottom:8px}
.how-desc{font-size:13px;color:var(--text-2);line-height:1.6}

/* UPLOAD SCREEN */
.upload-screen{max-width:840px;margin:0 auto;padding:52px 32px 100px}
.screen-h1{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;margin-bottom:8px}
.screen-sub{font-size:15px;color:var(--text-2);margin-bottom:40px}

.upload-pair{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:32px}
.upload-zone{aspect-ratio:3/4;border:2px dashed var(--border);border-radius:var(--r-lg);cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s,background 0.2s;background:var(--s1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--amber);background:var(--amber-dim)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:10;font-size:0}
.uz-tag{position:absolute;top:14px;left:14px;font-size:9px;font-weight:800;letter-spacing:2.5px;padding:4px 10px;border-radius:4px;background:var(--s3);z-index:5}
.uz-tag.before{color:var(--text-2)}
.uz-tag.after{color:var(--amber);background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.2)}
.uz-icon{font-size:38px;opacity:0.35}
.uz-hint{font-size:13px;color:var(--text-3);text-align:center;padding:0 16px;line-height:1.5}
.uz-thumb{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;z-index:3}
.uz-check{position:absolute;top:12px;right:12px;width:26px;height:26px;background:var(--amber);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;z-index:6}
.uz-replace{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.72);padding:10px;text-align:center;font-size:12px;font-weight:600;color:var(--text-2);opacity:0;transition:opacity 0.2s;z-index:7}
.upload-zone:hover .uz-replace{opacity:1}

/* Config */
.cfg-section{margin-bottom:28px}
.cfg-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:12px}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.type-pill{padding:11px 8px;text-align:center;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;background:var(--s1);color:var(--text-2);transition:all 0.15s;line-height:1.3}
.type-pill:hover{border-color:var(--amber);color:var(--text)}
.type-pill.sel{border-color:var(--amber);background:var(--amber-dim);color:var(--amber)}
.fmt-row{display:flex;gap:10px}
.fmt-btn{flex:1;padding:13px 8px;border:1px solid var(--border);border-radius:var(--r);background:var(--s1);color:var(--text-2);cursor:pointer;font-size:12px;font-weight:600;text-align:center;transition:all 0.15s}
.fmt-btn:hover{border-color:var(--amber)}
.fmt-btn.sel{border-color:var(--amber);background:var(--amber-dim);color:var(--amber)}
.fmt-icon{font-size:22px;display:block;margin-bottom:5px}

/* Generate button */
.gen-btn{width:100%;padding:19px;background:var(--amber);color:#000;font-size:17px;font-weight:900;letter-spacing:0.4px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 0 40px var(--amber-glow);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px}
.gen-btn:hover:not(:disabled){background:var(--amber-bright);transform:translateY(-2px);box-shadow:0 0 64px rgba(245,158,11,0.5)}
.gen-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none;background:var(--s3);color:var(--text-3)}

/* PROCESSING SCREEN */
.proc-screen{max-width:580px;margin:0 auto;padding:80px 32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:44px}
.proc-ring{width:82px;height:82px;border:3px solid var(--s4);border-top-color:var(--amber);border-radius:50%;animation:spin 0.85s linear infinite}
.proc-h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;margin-bottom:8px}
.proc-phase{font-size:15px;color:var(--text-2);min-height:22px;transition:all 0.3s}
.proc-bar-wrap{width:100%;height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.proc-bar{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber-bright));border-radius:3px;transition:width 0.7s ease}
.proc-pct{text-align:right;font-size:12px;color:var(--text-3);margin-top:7px}
.proc-steps{width:100%;border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--s1)}
.proc-step{display:flex;align-items:center;gap:16px;padding:15px 20px;border-bottom:1px solid var(--border)}
.proc-step:last-child{border-bottom:none}
.ps-dot{width:28px;height:28px;min-width:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--s3);color:var(--text-3);transition:all 0.3s}
.ps-dot.done{background:var(--amber);color:#000}
.ps-dot.active{background:transparent;border:2px solid var(--amber);color:var(--amber);animation:pulse 1.1s ease-in-out infinite}
.ps-text{font-size:14px;font-weight:500;color:var(--text-3);transition:color 0.3s}
.ps-text.done{color:var(--text)}
.ps-text.active{color:var(--text);font-weight:600}
.proc-note{font-size:13px;color:var(--text-3);background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;line-height:1.6}

/* RESULT SCREEN */
.result-screen{max-width:680px;margin:0 auto;padding:52px 32px 100px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:30px}
.result-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:40px;padding:8px 18px;font-size:13px;font-weight:700;color:var(--green)}
.result-h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:2px;line-height:1}
.video-container{width:100%;border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--border);background:#000;box-shadow:0 0 80px rgba(0,0,0,0.7)}
.video-container.portrait{max-width:340px}
.video-container video{width:100%;display:block}
.result-actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;width:100%}
.btn-amber{flex:1;min-width:150px;padding:16px 28px;background:var(--amber);color:#000;font-size:15px;font-weight:800;border:none;border-radius:50px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 0 30px var(--amber-glow)}
.btn-amber:hover:not(:disabled){background:var(--amber-bright);transform:translateY(-2px)}
.btn-amber:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-ghost{flex:1;min-width:150px;padding:16px 28px;background:transparent;color:var(--text);font-size:15px;font-weight:700;border:1px solid var(--border);border-radius:50px;cursor:pointer;transition:all 0.2s}
.btn-ghost:hover{border-color:var(--amber);color:var(--amber)}
.result-note{font-size:13px;color:var(--text-3)}

/* ERROR */
.err-box{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.28);border-radius:var(--r);padding:16px 20px;font-size:14px;color:var(--red);text-align:left;line-height:1.55}

/* RESPONSIVE */
@media(max-width:640px){
  .nav{padding:14px 20px}
  .hero{padding:52px 20px 40px}
  .hero-visual{padding:0 20px 56px}
  .hv-card{max-width:130px}
  .how{grid-template-columns:1fr;padding:0 20px 60px}
  .upload-screen,.proc-screen,.result-screen{padding-left:20px;padding-right:20px}
  .type-grid{grid-template-columns:repeat(2,1fr)}
  .fmt-row{flex-wrap:wrap}
  .result-actions,.btn-amber,.btn-ghost{min-width:unset}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

/* ─── Constants ──────────────────────────────────────────── */
const FREE_LIMIT = 3;

const PROJECT_TYPES = [
  'Residential Build', 'Commercial Build', 'Renovation',
  'Road / Infrastructure', 'Interior Remodel', 'Landscaping',
];

const FORMATS = [
  { id:'tiktok',     label:'TikTok / Reels', icon:'📱', aspect:'9:16'  },
  { id:'landscape',  label:'YouTube / X',    icon:'🖥️',  aspect:'16:9' },
  { id:'square',     label:'Instagram Feed', icon:'⬛', aspect:'1:1'  },
];

const STEPS = [
  'Analyzing your photos',
  'Connecting to Kling AI',
  'AI generating transformation',
  'Finalizing video',
];

/* ─── Utilities ──────────────────────────────────────────── */
const sleep = ms => new Promise(r => setTimeout(r, ms));

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function resizeImage(dataUrl, maxDim = 1024) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale  = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = Math.round(img.width  * scale);
      const h = Math.round(img.height * scale);
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(cv.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

/* ─── API ────────────────────────────────────────────────── */
async function startGeneration(before, after, projectType, aspect) {
  const r = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ before, after, projectType, aspectRatio: aspect }),
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d.requestId;
}

async function pollStatus(id) {
  const r = await fetch(`/api/status?id=${encodeURIComponent(id)}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d; // { status, videoUrl? }
}

/* ─── UploadZone ─────────────────────────────────────────── */
function UploadZone({ label, image, onUpload }) {
  const [drag, setDrag] = useState(false);

  const handleFiles = async files => {
    const file = files?.[0];
    if (!file) return;
    try {
      const dataUrl = await readFileAsDataUrl(file);
      onUpload(dataUrl);
    } catch(e) { console.error('File read error:', e); }
  };

  return (
    <div
      className={`upload-zone${drag ? ' drag-over' : ''}`}
      onDragOver={e => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={e => { e.preventDefault(); setDrag(false); handleFiles(e.dataTransfer.files); }}
    >
      <input
        type="file"
        accept="image/*,image/heic,image/heif"
        onChange={e => handleFiles(e.target.files)}
      />
      <div className={`uz-tag ${label.toLowerCase()}`}>{label}</div>
      {image ? (
        <>
          <img src={image} className="uz-thumb" alt={label} />
          <div className="uz-check">✓</div>
          <div className="uz-replace">Tap to replace</div>
        </>
      ) : (
        <>
          <div className="uz-icon">{label === 'BEFORE' ? '📷' : '🏗️'}</div>
          <div className="uz-hint">{label === 'BEFORE' ? 'Day one on site' : 'Completed project'}</div>
        </>
      )}
    </div>
  );
}

/* ─── HomeScreen ─────────────────────────────────────────── */
function HomeScreen({ onStart }) {
  return (
    <div className="home fade-in">
      <div className="hero">
        <div className="hero-badge fade-up">
          <span className="hero-badge-dot" />
          AI Construction Timelapse Generator
        </div>
        <h1 className="hero-title fade-up-1">
          TWO PHOTOS.<br /><span className="hero-em">ONE VIRAL VIDEO.</span>
        </h1>
        <p className="hero-sub fade-up-2">
          Upload a before and after shot. BuildCast uses Kling AI to generate a
          cinematic construction timelapse — download-ready for TikTok, Reels, and Instagram.
        </p>
        <button className="hero-cta fade-up-3" onClick={onStart}>
          Create Your Timelapse
          <span className="hero-arrow">→</span>
        </button>
      </div>

      <div className="hero-visual fade-in">
        <div className="hv-card hv-before">
          <div className="hv-grid" />
          <div className="hv-label">BEFORE</div>
        </div>
        <div className="hv-mid">
          <div className="hv-line" />
          <div className="hv-ai-bubble">AI</div>
          <div className="hv-line" />
        </div>
        <div className="hv-card hv-after">
          <div className="hv-grid" />
          <div className="hv-label">AFTER</div>
        </div>
      </div>

      <div className="how">
        {[
          { num:'01', icon:'📷', title:'Upload your before photo', desc:'Day one on site — empty lot, demo start, pre-construction.' },
          { num:'02', icon:'🏗️', title:'Upload your after photo',  desc:'The finished project — final walkthrough, client handoff, reveal shot.' },
          { num:'03', icon:'🎬', title:'AI generates the rest',    desc:'Kling AI fills in the transformation. You get a download-ready video in 60–120 seconds.' },
        ].map((s, i) => (
          <div key={s.num} className={`how-card fade-up-${i}`}>
            <div className="how-icon">{s.icon}</div>
            <div className="how-num">{s.num}</div>
            <div className="how-title">{s.title}</div>
            <div className="how-desc">{s.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── UploadScreen ───────────────────────────────────────── */
function UploadScreen({ onGenerate, error }) {
  const [before, setBefore]     = useState(null);
  const [after,  setAfter]      = useState(null);
  const [projType, setProjType] = useState('Residential Build');
  const [fmt, setFmt]           = useState(FORMATS[0]);
  const canGen = before && after;

  const handleGenerate = async () => {
    if (!canGen) return;
    const [rb, ra] = await Promise.all([
      resizeImage(before, 1024),
      resizeImage(after,  1024),
    ]);
    onGenerate(rb, ra, projType, fmt.aspect, fmt);
  };

  return (
    <div className="upload-screen fade-in">
      <h1 className="screen-h1">Upload Your Photos</h1>
      <p className="screen-sub">Before and after — that&apos;s all you need.</p>

      <div className="upload-pair">
        <UploadZone label="BEFORE" image={before} onUpload={setBefore} />
        <UploadZone label="AFTER"  image={after}  onUpload={setAfter}  />
      </div>

      <div className="cfg-section">
        <div className="cfg-label">Project Type</div>
        <div className="type-grid">
          {PROJECT_TYPES.map(t => (
            <div key={t} className={`type-pill${projType === t ? ' sel' : ''}`} onClick={() => setProjType(t)}>{t}</div>
          ))}
        </div>
      </div>

      <div className="cfg-section">
        <div className="cfg-label">Video Format</div>
        <div className="fmt-row">
          {FORMATS.map(f => (
            <div key={f.id} className={`fmt-btn${fmt.id === f.id ? ' sel' : ''}`} onClick={() => setFmt(f)}>
              <span className="fmt-icon">{f.icon}</span>
              {f.label}
            </div>
          ))}
        </div>
      </div>

      {error && <div className="err-box" style={{marginBottom:'20px'}}>⚠ {error}</div>}

      <button className="gen-btn" onClick={handleGenerate} disabled={!canGen}>
        {canGen ? '✦  Generate AI Timelapse' : 'Upload both photos to continue'}
      </button>
    </div>
  );
}

/* ─── ProcessingScreen ───────────────────────────────────── */
function ProcessingScreen({ progress, phase, stepIdx }) {
  return (
    <div className="proc-screen fade-in">
      <div className="proc-ring" />
      <div>
        <div className="proc-h1">Building Your Video</div>
        <div className="proc-phase">{phase || 'Starting up...'}</div>
      </div>
      <div style={{width:'100%'}}>
        <div className="proc-bar-wrap">
          <div className="proc-bar" style={{width:`${progress}%`}} />
        </div>
        <div className="proc-pct">{Math.round(progress)}%</div>
      </div>
      <div className="proc-steps">
        {STEPS.map((s, i) => {
          const done   = i < stepIdx;
          const active = i === stepIdx;
          return (
            <div key={s} className="proc-step">
              <div className={`ps-dot${done?' done':active?' active':''}`}>{done ? '✓' : i+1}</div>
              <div className={`ps-text${done?' done':active?' active':''}`}>{s}</div>
            </div>
          );
        })}
      </div>
      <div className="proc-note">
        ⏱ Kling AI typically takes 60–120 seconds. Keep this tab open — your video is being generated in real time.
      </div>
    </div>
  );
}

/* ─── ResultScreen ───────────────────────────────────────── */
function ResultScreen({ videoUrl, fmt, onStartOver }) {
  const [loading, setLoading] = useState(false);
  const portrait = fmt.aspect === '9:16';

  const download = async () => {
    setLoading(true);
    try {
      const r = await fetch(videoUrl);
      const blob = await r.blob();
      const url  = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `buildcast_timelapse_${Date.now()}.mp4`;
      a.click();
      URL.revokeObjectURL(url);
    } catch(e) {
      window.open(videoUrl, '_blank'); // CORS fallback
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="result-screen fade-in">
      <div className="result-badge bounce-in">✓ &nbsp;Your timelapse is ready</div>
      <h1 className="result-h1 fade-up">TRANSFORMATION<br />COMPLETE</h1>
      <div className={`video-container${portrait ? ' portrait' : ''} fade-up-1`}>
        <video src={videoUrl} controls autoPlay loop playsInline />
      </div>
      <div className="result-actions fade-up-2">
        <button className="btn-amber" onClick={download} disabled={loading}>
          {loading ? '⟳ Downloading...' : '↓  Download Video'}
        </button>
        <button className="btn-ghost" onClick={onStartOver}>← Create Another</button>
      </div>
      <div className="result-note fade-up-3">Video link expires in 24 hours — download to keep.</div>
    </div>
  );
}

/* ─── App ────────────────────────────────────────────────── */
function App() {
  const [screen,   setScreen]   = useState('home');
  const [progress, setProgress] = useState(0);
  const [phase,    setPhase]    = useState('');
  const [stepIdx,  setStep]     = useState(0);
  const [videoUrl, setVideo]    = useState(null);
  const [fmt,      setFmt]      = useState(FORMATS[0]);
  const [error,    setError]    = useState('');

  const [usageCount, setUsage] = useState(() => {
    try { return parseInt(localStorage.getItem('bc_usage') || '0', 10); } catch(e) { return 0; }
  });
  const [isPro, setIsPro] = useState(() => {
    try { return localStorage.getItem('bc_pro') === 'true'; } catch(e) { return false; }
  });

  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    if (p.get('success') === 'true') {
      setIsPro(true);
      try { localStorage.setItem('bc_pro', 'true'); } catch(e) {}
      window.history.replaceState({}, '', '/');
    }
    if (p.get('canceled') === 'true') window.history.replaceState({}, '', '/');
  }, []);

  const handleGenerate = async (before, after, projType, aspect, format) => {
    if (!isPro && usageCount >= FREE_LIMIT) {
      setError(`You've used all ${FREE_LIMIT} free timelapses. Upgrade to continue.`);
      setScreen('upload');
      return;
    }
    setFmt(format);
    setScreen('processing');
    setProgress(0); setPhase('Analyzing your photos...'); setStep(0); setError('');

    try {
      await sleep(700);
      setProgress(10); setPhase('Connecting to Kling AI...'); setStep(1);

      const requestId = await startGeneration(before, after, projType, aspect);

      setProgress(18); setPhase('AI is generating your transformation...'); setStep(2);

      // Poll
      let attempts = 0;
      const max = 60; // ~3.5 min
      while (attempts < max) {
        await sleep(3500);
        attempts++;

        const result = await pollStatus(requestId);

        if (result.status === 'completed' && result.videoUrl) {
          setProgress(96); setPhase('Finalizing...'); setStep(3);
          await sleep(700);
          setProgress(100);

          const newCount = usageCount + 1;
          setUsage(newCount);
          try { localStorage.setItem('bc_usage', String(newCount)); } catch(e) {}

          setVideo(result.videoUrl);
          setScreen('result');
          return;
        }

        if (result.status === 'failed') {
          throw new Error(result.error || 'AI generation failed. Please try again.');
        }

        const pct = Math.min(93, 18 + (attempts / max) * 74);
        setProgress(pct);
        if      (attempts < 8)  setPhase(`AI generating transformation... (${Math.round(attempts * 3.5)}s)`);
        else if (attempts < 20) setPhase('Still generating — complex scenes take time...');
        else                    setPhase('Nearly there — final render in progress...');
      }

      throw new Error('Generation timed out. Please try again with a different photo pair.');

    } catch(e) {
      console.error('Generation error:', e.message);
      setError(e.message);
      setScreen('upload');
    }
  };

  const Nav = ({ back }) => (
    <nav className="nav">
      <div className="logo" onClick={back ? () => setScreen('home') : undefined} style={back ? {cursor:'pointer'} : {}}>
        BUILD<span className="logo-accent">CAST</span>
      </div>
      <div className="nav-pill">AI TIMELAPSE</div>
    </nav>
  );

  if (screen === 'home')       return <><Nav /><HomeScreen onStart={() => setScreen('upload')} /></>;
  if (screen === 'upload')     return <><Nav back /><UploadScreen onGenerate={handleGenerate} error={error} /></>;
  if (screen === 'processing') return <><Nav /><ProcessingScreen progress={progress} phase={phase} stepIdx={stepIdx} /></>;
  if (screen === 'result')     return <><Nav back /><ResultScreen videoUrl={videoUrl} fmt={fmt} onStartOver={() => { setVideo(null); setError(''); setScreen('upload'); }} /></>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
