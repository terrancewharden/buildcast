<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildCast — Construction Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080909;
  --s1:#0E0F11;
  --s2:#141518;
  --s3:#1C1E23;
  --s4:#22252C;
  --border:#2A2D35;
  --border-light:#343840;
  --amber:#F59E0B;
  --amber-bright:#FCD34D;
  --amber-dim:rgba(245,158,11,0.1);
  --amber-glow:rgba(245,158,11,0.25);
  --blue:#3B82F6;
  --green:#10B981;
  --purple:#8B5CF6;
  --red:#EF4444;
  --text:#F2F2F2;
  --text-2:#9CA3AF;
  --text-3:#4B5563;
  --text-4:#2D3139;
  --r:12px;
  --r-lg:20px;
  --r-xl:28px;
  --t:all 0.2s ease;
  --shadow-card:0 4px 24px rgba(0,0,0,0.4);
  --shadow-hover:0 16px 48px rgba(0,0,0,0.6),0 0 0 1px rgba(245,158,11,0.2);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── ANIMATIONS ─────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes borderGlow{0%,100%{box-shadow:0 0 20px rgba(245,158,11,0.15)}50%{box-shadow:0 0 40px rgba(245,158,11,0.4)}}

.fade-up{animation:fadeUp 0.5s ease both}
.fade-up-d1{animation:fadeUp 0.5s ease 0.08s both}
.fade-up-d2{animation:fadeUp 0.5s ease 0.16s both}
.fade-up-d3{animation:fadeUp 0.5s ease 0.24s both}
.fade-in{animation:fadeIn 0.35s ease both}

/* ── LAYOUT ──────────────────────────────────── */
.app{min-height:100vh;display:flex;flex-direction:column}
.screen{flex:1;padding:0 32px 100px;max-width:1200px;margin:0 auto;width:100%}

/* ── NAV ─────────────────────────────────────── */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 40px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;
  background:rgba(8,9,9,0.92);
  backdrop-filter:blur(24px);
  z-index:100;
}
.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;letter-spacing:4px;
  cursor:pointer;display:flex;align-items:center;gap:2px;
}
.nav-logo .accent{color:var(--amber)}
.nav-logo .rest{color:var(--text)}
.nav-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);margin-left:6px;animation:pulse 2.5s infinite}
.nav-right{display:flex;align-items:center;gap:12px}
.usage-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--s3);border:1px solid var(--border);
  border-radius:100px;padding:7px 14px;
  font-size:12px;font-weight:500;color:var(--text-2);
}
.usage-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0;animation:pulse 2s infinite}
.usage-dot.green{background:var(--green)}
.pro-badge{
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(252,211,77,0.1));
  border:1px solid rgba(245,158,11,0.4);
  border-radius:100px;padding:7px 16px;
  font-size:12px;font-weight:700;color:var(--amber);letter-spacing:1px;
}

/* ── BUTTONS ─────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 22px;border-radius:var(--r);border:none;
  cursor:pointer;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;transition:var(--t);
  text-decoration:none;white-space:nowrap;letter-spacing:0.2px;
}
.btn-primary{background:var(--amber);color:#000}
.btn-primary:hover{background:var(--amber-bright);transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,158,11,0.4)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:rgba(245,158,11,0.5);color:var(--amber)}
.btn-dark{background:var(--s4);color:var(--text);border:1px solid var(--border)}
.btn-dark:hover{border-color:var(--amber);color:var(--amber)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px}
.btn-lg{padding:15px 36px;font-size:16px;border-radius:14px}
.btn-xl{padding:17px 48px;font-size:18px;border-radius:16px;font-family:'Bebas Neue';letter-spacing:3px}
.btn:disabled{opacity:0.38;cursor:not-allowed;transform:none !important;box-shadow:none !important}

/* ── HOME ────────────────────────────────────── */
.home-hero{padding:72px 0 56px;text-align:center;position:relative}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--amber-dim);border:1px solid rgba(245,158,11,0.35);
  border-radius:100px;padding:6px 18px;
  font-size:11px;font-weight:700;color:var(--amber);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px;
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(60px,9vw,108px);line-height:0.88;
  letter-spacing:3px;margin-bottom:24px;
}
.hero-title .line-1{display:block;color:var(--text)}
.hero-title .line-2{
  display:block;
  background:linear-gradient(90deg,var(--amber),var(--amber-bright),var(--amber));
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gradientMove 3s ease infinite;
}
.hero-sub{
  font-size:17px;color:var(--text-2);
  max-width:520px;margin:0 auto 40px;line-height:1.65;
}
.hero-free-label{
  display:inline-flex;align-items:center;gap:8px;
  font-size:13px;color:var(--text-3);margin-bottom:12px;
}
.hero-free-label span{color:var(--amber);font-weight:600}

.content-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:18px;
}
.content-card{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:28px 28px 24px;
  cursor:pointer;transition:all 0.25s ease;
  position:relative;overflow:hidden;
}
.content-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(245,158,11,0.04),transparent);
  opacity:0;transition:opacity 0.25s;border-radius:inherit;
  pointer-events:none;
}
.content-card:hover{
  transform:translateY(-5px);
  border-color:rgba(245,158,11,0.35);
  box-shadow:var(--shadow-hover);
}
.content-card:hover::after{opacity:1}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.card-icon-wrap{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.card-badge{
  font-size:10px;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;padding:4px 10px;border-radius:100px;
}
.card-badge-amber{background:var(--amber);color:#000}
.card-badge-blue{background:var(--blue);color:#fff}
.card-badge-purple{background:var(--purple);color:#fff}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;margin-bottom:8px}
.card-desc{font-size:13.5px;color:var(--text-2);line-height:1.55;margin-bottom:20px}
.card-bottom{display:flex;align-items:center;justify-content:space-between}
.card-chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{
  background:var(--s4);border:1px solid var(--border);
  border-radius:6px;padding:3px 9px;
  font-size:11px;font-weight:500;color:var(--text-3);
}
.card-arrow{color:var(--text-4);font-size:18px;transition:var(--t)}
.content-card:hover .card-arrow{color:var(--amber);transform:translate(4px,-2px)}

/* ── UPLOAD ──────────────────────────────────── */
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--r-xl);
  padding:72px 40px;text-align:center;
  cursor:pointer;transition:all 0.25s;
  background:var(--s1);position:relative;overflow:hidden;
  min-height:280px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.upload-zone:hover,.upload-zone.drag-over{
  border-color:var(--amber);
  background:var(--amber-dim);
}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.upload-float{animation:float 3.5s ease-in-out infinite;font-size:56px;margin-bottom:20px}
.upload-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;margin-bottom:10px}
.upload-sub{color:var(--text-2);font-size:15px;margin-bottom:6px}
.upload-hint{color:var(--text-3);font-size:12px}

.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:20px}
.photo-thumb{
  aspect-ratio:1;border-radius:10px;overflow:hidden;
  position:relative;background:var(--s3);border:1px solid var(--border);
  transition:var(--t);
}
.photo-thumb:hover{border-color:rgba(245,158,11,0.4)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-remove{
  position:absolute;top:6px;right:6px;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);
  border:none;color:#fff;width:22px;height:22px;
  border-radius:50%;cursor:pointer;
  display:none;align-items:center;justify-content:center;font-size:11px;
  transition:var(--t);
}
.photo-thumb:hover .photo-remove{display:flex}
.photo-remove:hover{background:var(--red)}

/* ── CONFIGURE ───────────────────────────────── */
.config-layout{display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:start}
.config-label{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  letter-spacing:2px;color:var(--text-2);margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.grade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:32px}
.grade-card{
  background:var(--s2);border:2px solid var(--border);
  border-radius:var(--r);padding:14px;cursor:pointer;
  transition:var(--t);position:relative;overflow:hidden;
}
.grade-card.sel{border-color:var(--amber);background:var(--amber-dim)}
.grade-card:hover:not(.sel){border-color:rgba(245,158,11,0.3)}
.grade-swatch{width:100%;height:52px;border-radius:8px;margin-bottom:10px}
.grade-name{font-weight:600;font-size:13px;margin-bottom:3px}
.grade-tag{font-size:11px;color:var(--text-3)}
.grade-check{
  position:absolute;top:10px;right:10px;
  width:20px;height:20px;border-radius:50%;
  background:var(--amber);color:#000;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;
  opacity:0;transition:opacity 0.2s;
}
.grade-card.sel .grade-check{opacity:1}

.platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:32px}
.platform-card{
  background:var(--s2);border:2px solid var(--border);
  border-radius:var(--r);padding:14px 12px;cursor:pointer;
  transition:var(--t);text-align:center;
}
.platform-card.sel{border-color:var(--amber);background:var(--amber-dim)}
.platform-card:hover:not(.sel){border-color:rgba(245,158,11,0.3)}
.platform-icon{font-size:26px;margin-bottom:8px}
.platform-name{font-weight:600;font-size:12px;line-height:1.3;margin-bottom:4px}
.platform-aspect{font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums}

.range-wrap{margin-bottom:32px}
.range-track{
  -webkit-appearance:none;appearance:none;
  width:100%;height:5px;border-radius:3px;
  background:var(--s4);outline:none;cursor:pointer;
}
.range-track::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;
  border-radius:50%;background:var(--amber);cursor:pointer;
  box-shadow:0 0 0 4px rgba(245,158,11,0.2);
  transition:box-shadow 0.2s;
}
.range-track::-webkit-slider-thumb:hover{box-shadow:0 0 0 6px rgba(245,158,11,0.3)}
.range-labels{display:flex;justify-content:space-between;margin-top:8px;color:var(--text-3);font-size:11px}

/* ── STICKY GENERATE PANEL ───────────────────── */
.gen-panel{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:24px;
  position:sticky;top:90px;
}
.gen-preview{
  border-radius:12px;background:var(--s4);
  overflow:hidden;position:relative;margin-bottom:20px;
}
.gen-preview-inner{
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;color:var(--text-3);
}
.gen-meta{margin-bottom:20px}
.gen-meta-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;padding:6px 0;border-bottom:1px solid var(--s4);
}
.gen-meta-row:last-child{border:none}
.gen-meta-label{color:var(--text-3)}
.gen-meta-value{color:var(--text-2);font-weight:500}
.paywall-note{
  background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(252,211,77,0.04));
  border:1px solid rgba(245,158,11,0.25);
  border-radius:10px;padding:14px;margin-bottom:16px;text-align:center;
}

/* ── PROCESSING ──────────────────────────────── */
.processing-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:65vh;text-align:center;
}
.proc-ring-wrap{
  position:relative;width:128px;height:128px;margin-bottom:40px;
}
.proc-ring{
  width:128px;height:128px;border:3px solid var(--s4);
  border-top-color:var(--amber);border-radius:50%;
  animation:spin 1.1s linear infinite;position:absolute;inset:0;
}
.proc-ring-inner{
  width:100px;height:100px;border:2px solid var(--s3);
  border-top-color:rgba(245,158,11,0.4);border-radius:50%;
  animation:spin 1.8s linear infinite reverse;
  position:absolute;top:14px;left:14px;
}
.proc-emoji{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:38px;
}
.proc-title{
  font-family:'Bebas Neue',sans-serif;font-size:52px;
  letter-spacing:4px;margin-bottom:10px;
}
.proc-phase{color:var(--text-2);font-size:15px;margin-bottom:40px;min-height:24px}
.progress-bar{
  width:100%;max-width:420px;height:5px;
  background:var(--s4);border-radius:3px;overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--amber),var(--amber-bright));
  transition:width 0.3s ease;position:relative;overflow:hidden;
}
.progress-fill::after{
  content:'';position:absolute;top:0;bottom:0;
  width:60px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  animation:shimmer 1.5s infinite;
}
.progress-pct{
  margin-top:14px;font-size:14px;font-weight:700;
  color:var(--amber);font-variant-numeric:tabular-nums;
}
.proc-tip{
  margin-top:36px;color:var(--text-3);font-size:13px;
  max-width:360px;line-height:1.65;
}

/* ── RESULT ──────────────────────────────────── */
.result-layout{display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start;margin-top:24px}
.result-preview-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r-xl);overflow:hidden;
}
.result-preview-card video,
.result-preview-card img{width:100%;display:block}
.photo-carousel{
  display:flex;gap:8px;overflow-x:auto;padding:12px;
}
.photo-carousel::-webkit-scrollbar{height:3px}
.photo-carousel img{
  height:72px;border-radius:7px;cursor:pointer;
  border:2px solid transparent;flex-shrink:0;
  transition:var(--t);
}
.photo-carousel img.active{border-color:var(--amber)}
.photo-carousel img:hover{opacity:0.85}

.result-meta-row{
  display:flex;gap:12px;margin-top:14px;
}
.result-meta-pill{
  flex:1;background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;
}
.result-meta-key{font-size:11px;color:var(--text-3);margin-bottom:4px}
.result-meta-val{font-size:13px;font-weight:600}

.dl-panel{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:24px;
}
.dl-title{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:2px;margin-bottom:18px;
}
.dl-btn{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--s3);border:1px solid var(--border);
  border-radius:10px;padding:13px 16px;margin-bottom:9px;
  cursor:pointer;transition:var(--t);text-decoration:none;color:inherit;
}
.dl-btn:hover{border-color:rgba(245,158,11,0.4);background:var(--amber-dim)}
.dl-btn-left{display:flex;align-items:center;gap:12px}
.dl-icon{font-size:22px}
.dl-name{font-weight:600;font-size:13px}
.dl-size{font-size:11px;color:var(--text-3);margin-top:2px}
.dl-arrow{color:var(--text-4);transition:var(--t);font-size:16px}
.dl-btn:hover .dl-arrow{color:var(--amber);transform:translateX(3px)}

.tip-card{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:18px;margin-top:14px;
}
.tip-label{
  font-size:11px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text-3);margin-bottom:10px;
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;
}
.tip-text{font-size:12px;color:var(--text-3);line-height:1.65}

/* ── SCREEN HEADER ───────────────────────────── */
.screen-header{padding:40px 0 28px}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--text-3);font-size:13px;cursor:pointer;
  margin-bottom:18px;transition:var(--t);
  background:none;border:none;padding:0;
}
.back-btn:hover{color:var(--amber)}
.screen-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px}
.screen-sub{color:var(--text-2);font-size:15px;margin-top:6px}

/* ── BOTTOM BAR ──────────────────────────────── */
.bottom-bar{
  position:sticky;bottom:0;
  background:rgba(8,9,9,0.96);border-top:1px solid var(--border);
  padding:16px 40px;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(20px);z-index:50;
}
.bottom-left{color:var(--text-2);font-size:13px}
.bottom-left strong{color:var(--text);font-weight:600}

/* ── PRICING MODAL ───────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.88);
  z-index:200;display:flex;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(10px);
}
.modal{
  background:var(--s1);border:1px solid var(--border-light);
  border-radius:var(--r-xl);max-width:980px;width:100%;
  padding:52px 48px;animation:fadeUp 0.3s ease;
  overflow-y:auto;max-height:92vh;position:relative;
}
.modal-close{
  position:absolute;top:20px;right:20px;
  background:var(--s3);border:1px solid var(--border);
  color:var(--text-2);width:36px;height:36px;
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:var(--t);font-size:14px;
}
.modal-close:hover{border-color:var(--amber);color:var(--amber)}
.modal-header{text-align:center;margin-bottom:52px}
.modal-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--amber-dim);border:1px solid rgba(245,158,11,0.3);
  border-radius:100px;padding:6px 18px;

<script type="text/babel">

/* ══════════════════════════════════════════════

  },

  },
];

const FREE_LIMIT = 3;

/* ══════════════════════════════════════════════
   IMAGE PROCESSING ENGINE
══════════════════════════════════════════════ */
function applyGrade(data, id) {
  for (let i = 0; i < data.length; i += 4) {
    let r = data[i], g = data[i+1], b = data[i+2];
    if (id === 'golden') {
      r = Math.min(255, r*1.18+14); g = Math.min(255, g*1.05+4); b = Math.max(0, b*0.74);
    } else if (id === 'steel') {
      const lum = 0.299*r+0.587*g+0.114*b;
      r = Math.min(255, lum*0.42+r*0.65); g = Math.min(255, lum*0.45+g*0.65); b = Math.min(255, lum*0.38+b*0.88+24);
    } else if (id === 'cinema') {
      r = Math.min(255, r*1.14+10); g = Math.min(255, g*0.93-2); b = Math.max(0, Math.min(255, b*0.8+18));
      r = Math.min(255, r+Math.max(0,(42-r)*0.28)); b = Math.min(255, b+Math.max(0,(42-b)*0.42));
    } else if (id === 'hdr') {
      const avg = (r+g+b)/3;
      r = Math.min(255, r+(r-avg)*0.38); g = Math.min(255, g+(g-avg)*0.38); b = Math.min(255, b+(b-avg)*0.38);
      const sig = v => Math.min(255, Math.max(0, 255/(1+Math.exp(-(v-128)/36))));
      r = sig(r); g = sig(g); b = sig(b);
    } else if (id === 'clean') {
      r = Math.min(255, r*1.07+12); g = Math.min(255, g*1.07+12); b = Math.min(255, b*1.09+14);
    }
    data[i]=r; data[i+1]=g; data[i+2]=b;
  }
}

function coverFit(imgW, imgH, cW, cH) {
  const ir = imgW/imgH, cr = cW/cH;
  let dw, dh, dx, dy;
  if (ir > cr) { dh=cH; dw=dh*ir; dx=(cW-dw)/2; dy=0; }
  else          { dw=cW; dh=dw/ir; dx=0; dy=(cH-dh)/2; }
  return {dw,dh,dx,dy};
}

async function processPhoto(imgEl, gradeId, pw, ph) {
  const c = document.createElement('canvas');
  c.width=pw; c.height=ph;
  const ctx = c.getContext('2d');
  const {dw,dh,dx,dy} = coverFit(imgEl.naturalWidth, imgEl.naturalHeight, pw, ph);
  ctx.fillStyle='#080909'; ctx.fillRect(0,0,pw,ph);
  ctx.drawImage(imgEl,dx,dy,dw,dh);
  if (gradeId) { const id=ctx.getImageData(0,0,pw,ph); applyGrade(id.data,gradeId); ctx.putImageData(id,0,0); }
  return c.toDataURL('image/jpeg',0.92);
}

function getBestMimeType() {
  const types = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
}

// Resize image for AI API — keeps payload small and fast
async function resizeForAI(imgEl, maxW=1024, maxH=576) {
  const ratio = Math.min(maxW/imgEl.naturalWidth, maxH/imgEl.naturalHeight, 1);
  const c = document.createElement('canvas');
  c.width  = Math.round(imgEl.naturalWidth  * ratio);
  c.height = Math.round(imgEl.naturalHeight * ratio);
  c.getContext('2d').drawImage(imgEl, 0, 0, c.width, c.height);
  return c.toDataURL('image/jpeg', 0.82);
}

function roundRect(ctx, x, y, w, h, r) {
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x,y,w,h,r); return; }
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function analyzeProjectType(imgEls) {
  const samples = Math.min(3, imgEls.length);
  let tR=0, tG=0, tB=0;
  for (let i=0; i<samples; i++) {
    const img = imgEls[i];
    const tc = document.createElement('canvas'); tc.width=60; tc.height=45;
    const tctx = tc.getContext('2d'); tctx.drawImage(img,0,0,60,45);
    const d = tctx.getImageData(0,0,60,45).data;
    for (let p=0;p<d.length;p+=4){ tR+=d[p]; tG+=d[p+1]; tB+=d[p+2]; }
  }
  const px=samples*60*45, r=tR/px, g=tG/px, b=tB/px;
  const brightness=(r+g+b)/3, warmth=r-b;
  if (warmth>28 && brightness>90)  return {type:'RESIDENTIAL BUILD',    phases:['SITE PREP','FOUNDATION','FRAMING','ROUGH-IN','DRYWALL','COMPLETION']};
  if (warmth<8  && brightness<115) return {type:'COMMERCIAL PROJECT',   phases:['SITE PREP','FOUNDATION','STRUCTURAL','CONCRETE POUR','MECHANICAL','FINISHING']};
  if (brightness<75)               return {type:'EXCAVATION PROJECT',   phases:['CLEARING','EXCAVATION','GRADING','DRAINAGE','UTILITY WORK','COMPLETION']};
  return                                  {type:'CONSTRUCTION PROJECT', phases:['SITE PREP','FOUNDATION','FRAMING','ROUGH-IN','FINISHING','COMPLETION']};
}

function getPhaseLabel(imgIdx, totalImgs, projectInfo) {
  const phases = projectInfo.phases;
  const idx = Math.min(Math.floor((imgIdx/totalImgs)*phases.length), phases.length-1);
  const day = Math.round((imgIdx/Math.max(totalImgs-1,1))*180)+1;
  return { phase: phases[idx], day };
}

async function renderVideo(imgEls, gradeId, platform, durationSec, mode, onProgress, projectInfo) {
  return new Promise((resolve, reject) => {
    const scale = 0.75;
    const pw = Math.round(Math.min(platform.w, 1080)*scale);
    const ph = Math.round(pw * platform.h / platform.w);
    const c = document.createElement('canvas');
    c.width=pw; c.height=ph;
    const ctx = c.getContext('2d');

    if (typeof MediaRecorder === 'undefined') {
      reject(new Error('MediaRecorder not supported in this browser. Please use Chrome or Firefox.'));
      return;
    }

    const mimeType = getBestMimeType();
    const chunks = [];
    const stream = c.captureStream(24);
    const rec = new MediaRecorder(stream, {mimeType, videoBitsPerSecond:5000000});
    rec.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    rec.onstop = () => resolve(new Blob(chunks,{type:'video/webm'}));
    rec.onerror = e => reject(e.error);
    rec.start(200);

    const fps = 24;
    const secPerImg = durationSec / imgEls.length;
    const framesPerImg = Math.max(fps, Math.ceil(fps*secPerImg));
    const effects = ['zoom-in','zoom-out','pan-right','pan-left','zoom-in'];
    let imgIdx=0, frame=0;

    const tick = () => {
      if (imgIdx >= imgEls.length) { setTimeout(()=>rec.stop(), 500); return; }
      const img = imgEls[imgIdx];
      const t = (frame % framesPerImg) / framesPerImg;
      const frameInImg = frame % framesPerImg;
      const eff = mode==='timelapse' ? (imgIdx%2===0?'zoom-in':'zoom-out') : effects[imgIdx%effects.length];
      const {dw,dh,dx,dy} = coverFit(img.naturalWidth, img.naturalHeight, pw, ph);

      let extraScale=1, ox=0, oy=0;
      if (eff==='zoom-in')   extraScale = 1.04+t*0.08;
      else if (eff==='zoom-out') extraScale = 1.12-t*0.08;
      else if (eff==='pan-right') { extraScale=1.1; ox=(t-0.5)*pw*0.07; }
      else { extraScale=1.1; ox=-(t-0.5)*pw*0.07; }

      // Subtle brightness flicker simulates time-of-day changes
      const flicker = mode==='timelapse' ? (0.92+Math.sin(frame*0.41)*0.08) : 1;

      ctx.fillStyle='#080909'; ctx.fillRect(0,0,pw,ph);
      ctx.save();
      ctx.translate(pw/2+ox, ph/2+oy);
      ctx.scale(extraScale, extraScale);
      ctx.translate(-pw/2, -ph/2);
      ctx.globalAlpha = flicker;
      ctx.drawImage(img,dx,dy,dw,dh);
      ctx.globalAlpha = 1;
      ctx.restore();

      if (gradeId) { const id=ctx.getImageData(0,0,pw,ph); applyGrade(id.data,gradeId); ctx.putImageData(id,0,0); }

      // ── Timelapse HUD overlays ─────────────────────────────
      if (mode==='timelapse' && projectInfo) {
        const lbl = getPhaseLabel(imgIdx, imgEls.length, projectInfo);
        const fs = Math.max(13, Math.round(pw*0.026));

        // Day counter pill — top right
        const dayStr = `DAY ${lbl.day}`;
        ctx.save();
        ctx.font = `700 ${fs}px Inter, Arial, sans-serif`;
        const dtw = ctx.measureText(dayStr).width;
        const dp=10, dW=dtw+dp*2+8, dH=fs+14, dX=pw-dW-14, dY=14;
        ctx.fillStyle='rgba(0,0,0,0.62)';
        roundRect(ctx,dX,dY,dW,dH,5); ctx.fill();
        ctx.fillStyle='#F59E0B'; ctx.textAlign='left';
        ctx.fillText(dayStr, dX+dp, dY+dH-6);
        ctx.restore();

        // Project type badge — top left, first image only
        if (imgIdx===0 && frameInImg < framesPerImg*0.65) {
          ctx.save();
          ctx.font = `700 ${Math.round(fs*0.82)}px Inter, Arial, sans-serif`;
          const ptw = ctx.measureText(projectInfo.type).width+24;
          ctx.fillStyle='rgba(245,158,11,0.95)';
          roundRect(ctx,14,14,ptw,fs+12,5); ctx.fill();
          ctx.fillStyle='#000'; ctx.textAlign='left';
          ctx.fillText(projectInfo.type, 26, 14+fs+2);
          ctx.restore();
        }

        // Phase label — lower third, fades in/out
        if (frameInImg < framesPerImg*0.55) {
          const pAlpha = Math.min(1, frameInImg/5) * (frameInImg < framesPerImg*0.42 ? 1 : Math.max(0,(framesPerImg*0.55-frameInImg)/(framesPerImg*0.13)));
          ctx.save();
          const bh=Math.round(ph*0.09), by=ph-bh;
          ctx.fillStyle=`rgba(0,0,0,${0.68*pAlpha})`; ctx.fillRect(0,by,pw,bh);
          ctx.fillStyle=`rgba(245,158,11,${pAlpha})`; ctx.fillRect(0,by,5,bh);
          ctx.font=`700 ${Math.round(fs*1.05)}px Inter, Arial, sans-serif`;
          ctx.fillStyle=`rgba(255,255,255,${pAlpha})`; ctx.textAlign='left';
          ctx.fillText(lbl.phase, 20, by+bh*0.68);
          ctx.restore();
        }

        // Flash cut at start of each new image
        if (frameInImg < 5) {
          ctx.fillStyle=`rgba(255,255,255,${(1-frameInImg/5)*0.65})`;
          ctx.fillRect(0,0,pw,ph);
        }
      }

      // Fade between clips for sizzle/presentation
      if (mode!=='timelapse') {
        const fadeAt = 0.84;
        if (t > fadeAt) {
          const a = (t-fadeAt)/(1-fadeAt);
          ctx.fillStyle=`rgba(0,0,0,${a*0.9})`;
          ctx.fillRect(0,0,pw,ph);
        }
      }

      frame++;
      if (frame % framesPerImg === 0) { imgIdx++; onProgress&&onProgress(imgIdx/imgEls.length); }
      if (imgIdx < imgEls.length) requestAnimationFrame(tick);
      else setTimeout(()=>rec.stop(),500);
    };

    requestAnimationFrame(tick);
  });
}

/* ══════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════ */
function App() {
  const [screen, setScreen]     = useState('home');
  const [selType, setSelType]   = useState(null);
  const [photos, setPhotos]     = useState([]);
  const [imgEls, setImgEls]     = useState([]);
  const [grade, setGrade]       = useState('golden');
  const [platform, setPlatform] = useState(PLATFORMS[0]);
  const [duration, setDuration] = useState(15);
  const [progress, setProgress] = useState(0);
  const [phase, setPhase]       = useState('');
  const [result, setResult]     = useState(null);
  const [showPricing, setShowPricing] = useState(false);
  const [compatError, setCompatError] = useState('');
  const [usageCount, setUsageCount] = useState(() => {
    try { return parseInt(localStorage.getItem('bc_usage')||'0',10); } catch(e){return 0;}
  });
  const [isPro, setIsPro] = useState(() => {
    try { return localStorage.getItem('bc_pro')==='true'; } catch(e){return false;}
  });
  const [checkoutLoading, setCheckoutLoading] = useState(false);

  // Handle Stripe redirect back to app
  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    if (p.get('success')==='true') {
      const plan = p.get('plan') || 'starter';
      setIsPro(true);
      try { localStorage.setItem('bc_pro','true'); localStorage.setItem('bc_plan',plan); } catch(e){}
      window.history.replaceState({}, '', '/');
    }
    if (p.get('canceled')==='true') {
      window.history.replaceState({}, '', '/');
    }
  }, []);

  const remaining = Math.max(0, FREE_LIMIT - usageCount);
  const canGen = isPro || usageCount < FREE_LIMIT;

  const addPhotos = useCallback((files) => {
    [...files].forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        setPhotos(p=>[...p,url]);
        setImgEls(p=>[...p,img]);
      };
      img.src = url;
    });
  }, []);

  const removePhoto = (i) => {
    setPhotos(p=>p.filter((_,idx)=>idx!==i));
    setImgEls(p=>p.filter((_,idx)=>idx!==i));
  };

  const generate = async () => {
    if (!canGen) { setShowPricing(true); return; }
    setScreen('processing'); setProgress(0); setCompatError('');

    try {
      let res = null;
      setPhase('Analyzing your project photos...');
      await sleep(700);

      if (selType.id==='timelapse' || selType.id==='sizzle' || selType.id==='presentation') {
        const mode = selType.id==='timelapse' ? 'timelapse' : 'sizzle';
        let projectInfo = null;

        // ── AI Timelapse path ──────────────────────────────────
        if (selType.id==='timelapse') {
          setPhase('Scanning photos — identifying project type...');
          await sleep(400);
          projectInfo = analyzeProjectType(imgEls);
          setPhase(`${projectInfo.type} detected — sending to AI...`);
          await sleep(400);

          try {
            // Resize all photos for API
            setPhase('Preparing photos for AI generation...');
            const resized = await Promise.all(imgEls.map(img => resizeForAI(img)));
            setProgress(6);

            // Start all predictions in parallel
            const predIds = [];
            for (let i=0; i<resized.length; i++) {
              setPhase(`Queuing AI clip ${i+1} of ${resized.length}...`);
              const r = await fetch('/api/timelapse/start', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ image: resized[i] })
              });
              const d = await r.json();
              if (d.error) throw new Error(d.error);
              predIds.push(d.id);
              setProgress(6 + ((i+1)/resized.length)*12);
            }

            // Poll until all clips complete
            const videoUrls = new Array(predIds.length).fill(null);
            const done = new Set();
            setPhase(`AI generating ${predIds.length} timelapse clip${predIds.length>1?'s':''}...`);

            while (done.size < predIds.length) {
              await sleep(3500);
              for (let i=0; i<predIds.length; i++) {
                if (done.has(i)) continue;
                const r = await fetch(`/api/timelapse/status?id=${predIds[i]}`);
                const d = await r.json();
                if (d.status==='succeeded' && d.url) {
                  videoUrls[i] = d.url;
                  done.add(i);
                  setProgress(18 + (done.size/predIds.length)*76);
                  setPhase(`Clip ${done.size} of ${predIds.length} ready${done.size<predIds.length?' — AI still working...':' — finishing up!'}`);
                } else if (d.status==='failed') {
                  throw new Error('AI generation failed: ' + (d.error||'unknown'));
                }
              }
            }

            setProgress(100);
            await sleep(400);
            res = { type:'ai-timelapse', urls:videoUrls, projectInfo, filename:'buildcast_timelapse' };

          } catch(aiErr) {
            // Graceful fallback to canvas timelapse
            console.warn('AI timelapse failed, falling back to canvas:', aiErr.message);
            setPhase('Falling back to canvas render...');
            await sleep(400);
            setProgress(8);
            const dur = duration;
            const blob = await renderVideo(imgEls, grade, platform, dur, 'timelapse', p=>{
              setProgress(8+p*82);
              if (p<0.5) setPhase('Rendering frames...'); else setPhase('Encoding video...');
            }, projectInfo);
            setProgress(100);
            await sleep(400);
            res = { type:'video', blob, url:URL.createObjectURL(blob), filename:'buildcast_timelapse.webm' };
          }

        } else {
          // ── Sizzle / Presentation (canvas path) ──────────────
          setPhase(selType.id==='sizzle' ? 'Applying cinematic effects...' : 'Assembling your presentation...');
          setProgress(8);
          const dur = selType.id==='presentation' ? Math.max(12, imgEls.length*3) : duration;
          const blob = await renderVideo(imgEls, grade, platform, dur, mode, p=>{
            setProgress(8+p*82);
            if (p<0.5) setPhase('Rendering frames with color grade...'); else setPhase('Encoding video...');
          }, null);
          setProgress(96); setPhase('Finalizing...');
          await sleep(600);
          res = { type:'video', blob, url:URL.createObjectURL(blob), filename:`buildcast_${selType.id}.webm` };
        } // end sizzle/presentation

      } else {
        const urls = [];
        for (let i=0; i<imgEls.length; i++) {
          setPhase(`Grading photo ${i+1} of ${imgEls.length}...`);
          setProgress(Math.round((i/imgEls.length)*88)+4);
          const dataUrl = await processPhoto(imgEls[i], grade, platform.w, platform.h);
          urls.push(dataUrl);
          await sleep(30);
        }
        setProgress(96); setPhase('Packaging your photos...');
        await sleep(700);
        res = { type:'photos', urls, filename:'buildcast_photos' };
      }

      setProgress(100);
      const newCount = usageCount+1;
      setUsageCount(newCount);
      try { localStorage.setItem('bc_usage', String(newCount)); } catch(e){}

      await sleep(400);
      setResult(res);
      setScreen('result');

    } catch(err) {
      console.error(err);
      setScreen('configure');
      setCompatError(err.message || 'Processing failed. Please try again.');
    }
  };

  const doUpgrade = async (planId) => {
    setCheckoutLoading(true);
    try {
      const r = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ plan: planId })
      });
      const data = await r.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert('Checkout error: ' + (data.error || 'Unknown error'));
        setCheckoutLoading(false);
      }
    } catch(e) {
      alert('Could not reach checkout. Please try again.');
      setCheckoutLoading(false);
    }
  };

  const goHome = () => {
    setScreen('home'); setResult(null);
    setPhotos([]); setImgEls([]); setSelType(null);
  };

  return (
    <div className="app">
      <Nav
        remaining={remaining} isPro={isPro}
        onHome={goHome}
        onPricing={()=>setShowPricing(true)}
      />

      <div className={`screen ${screen!=='processing'?'fade-up':''}`} key={screen}>
        {screen==='home'       && <HomeScreen onSelect={t=>{setSelType(t);setPhotos([]);setImgEls([]);setResult(null);setScreen('upload');}} remaining={remaining} isPro={isPro} onPricing={()=>setShowPricing(true)} />}
        {screen==='upload'     && <UploadScreen type={selType} photos={photos} onBack={()=>setScreen('home')} onNext={()=>setScreen('configure')} onAdd={addPhotos} onRemove={removePhoto} />}
        {screen==='configure'  && <ConfigureScreen type={selType} grade={grade} setGrade={setGrade} platform={platform} setPlatform={setPlatform} duration={duration} setDuration={setDuration} onBack={()=>setScreen('upload')} onGenerate={generate} canGen={canGen} remaining={remaining} onPricing={()=>setShowPricing(true)} photoCount={photos.length} compatError={compatError} />}
        {screen==='processing' && <ProcessingScreen progress={progress} phase={phase} type={selType} />}
        {screen==='result'     && <ResultScreen result={result} type={selType} platform={platform} onNew={goHome} />}
      </div>

      {showPricing && <PricingModal onClose={()=>setShowPricing(false)} onUpgrade={doUpgrade} remaining={remaining} />}

  );

    Math.min(Math.floor((idx/urls.length)*result.projectInfo.phases.length), result.projectInfo.phases.length-1)

  const advance = () => {
    if (idx < urls.length-1) { setIdx(i=>i+1); }

    <div style={{position:'relative',background:'#000',borderRadius:12,overflow:'hidden'}}>
      <video ref={vidRef} src={urls[idx]} style={{width:'100%',display:'block',maxHeight:520,objectFit:'contain'}}

                </div>
                {result.urls?.map((url,i)=>(
                  <a key={i} className="dl-btn" href={url} download={`${result.filename}_${i+1}.jpg`}>
                    <div className="dl-btn-left">
                      <span className="dl-icon">🖼</span>
                      <div>
                        <div className="dl-name">Photo {i+1}</div>
                        <div className="dl-size">{platform?.w}×{platform?.h} · JPEG</div>
                      </div>
                    </div>
                    <span className="dl-arrow">→</span>
                  </a>
                ))}
              </>
            )}

            <div style={{borderTop:'1px solid var(--border)',marginTop:18,paddingTop:18}}>
              <button className="btn btn-ghost" style={{width:'100%'}} onClick={onNew}>
                ↺ &nbsp;Create Another
              </button>
            </div>
          </div>

          <div className="tip-card">
            <div className="tip-label">📣 Platform Tip</div>
            <p className="tip-text">{tip}</p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── PRICING ─────────────────────────────────── */
function PricingModal({ onClose, onUpgrade, remaining }) {
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>

        <div className="modal-header">
          <div className="modal-eyebrow">🔓 Unlock Full Access</div>
          <h2 className="modal-title">CHOOSE YOUR PLAN</h2>
          <p className="modal-sub">
            {remaining>0
              ? `You have ${remaining} free video${remaining!==1?'s':''} remaining. Upgrade anytime.`
              : "You've used all 3 free videos. Keep creating below."}
          </p>
        </div>

        <div className="plans-grid">
          {PLANS.map(plan=>(
            <div key={plan.id} className={`plan-card ${plan.pop?'pop':''}`}>
              {plan.pop && <div className="pop-badge">MOST POPULAR</div>}
              <div className="plan-name" style={{color:plan.color}}>{plan.name}</div>
              <div className="plan-price-wrap">
                <span className="plan-price">${plan.price}</span>
                <span className="plan-price-per">/month</span>
              </div>
              <div className="plan-videos">{plan.videos} videos per month</div>
              <ul className="plan-features">
                {plan.features.map(f=><li key={f}>{f}</li>)}
              </ul>
              <button
                className={`btn ${plan.pop?'btn-primary':'btn-dark'} btn-lg plan-btn`}
                style={plan.pop?{background:plan.color,color:'#000'}:{}}
                onClick={()=>onUpgrade(plan.id)}
              >
                Get {plan.name}
              </button>
            </div>
          ))}
        </div>

        <div className="modal-footer">
          Cancel anytime &nbsp;·&nbsp; No hidden fees &nbsp;·&nbsp; All plans include all 5 content types
        </div>
      </div>
    </div>
  );
}

/* ── MOUNT ───────────────────────────────────── */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
